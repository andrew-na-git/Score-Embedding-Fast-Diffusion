name: cifar1_tol1e4

data_loader:
  num_images: 1
  image_size: 32
  dataset: cifar
  seed: 9
  channels: 3
  batch_size: 20

diffusion:
  sigma: 5
  dh: 1
  num_timesteps: 20
  solve_tolerance: 1e-4

training:
  epochs: 300
  lr: 8e-5
  grad_clip: False
  timestep_multiplier: 1

model:
  max_positions: 10000
  in_channels: 3
  out_channels: 3
  ch: 128
  ch_mult: [1, 2, 2, 2]
  num_res_blocks: 2
  attention_resolutions: [16, ]
  dropout: 0.1
  resample_with_conv: True
  embedding_method: linear

sample:
  type: unconditional

misc:
  eps: 1e-3
  profile_freq: 2
